<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Connexion</title></head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center mt-3">
        <div class="col-md-5 col-lg-4">

            <!-- Message de déconnexion -->
            <div th:if="${param.logout}" class="alert alert-info d-flex align-items-center mb-3" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> Déconnexion réussie.
            </div>

            <!-- Message d'erreur -->
            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center mb-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Identifiants incorrects.
            </div>

            <div class="card shadow-card">
                <div class="text-center text-white py-4 rounded-top-4"
                     style="background: linear-gradient(135deg, #6366f1, #ec4899);">
                    <i class="bi bi-shield-lock" style="font-size:2.5rem;"></i>
                    <h5 class="fw-bold mt-2 mb-0">Connexion</h5>
                </div>
                <div class="card-body p-4">
                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                <input type="text" id="username" name="username" class="form-control"
                                       placeholder="Votre login" autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control"
                                       placeholder="Votre mot de passe">
                            </div>
                        </div>
                        <div class="d-grid">
                            <button class="btn btn-violet fw-bold py-2">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Se connecter
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
