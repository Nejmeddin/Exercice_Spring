<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Ajouter une personne</title></head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-lg-7">

            <!-- En-tête -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h4 class="fw-bold mb-0"><i class="bi bi-person-plus me-2" style="color:#10b981;"></i>Nouvelle personne</h4>
                <a th:href="@{/persons/search}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i> Retour
                </a>
            </div>

            <!-- Formulaire -->
            <div class="card shadow-card">
                <div class="text-white py-3 px-4"
                     style="background: linear-gradient(135deg, #10b981, #34d399); border-radius: 12px 12px 0 0;">
                    <i class="bi bi-person-plus me-2"></i>
                    <span class="fw-bold">Formulaire d'ajout</span>
                </div>
                <div class="card-body p-4">
                    <form method="post" th:action="@{/persons/new}" th:object="${person}">
                        <div class="row g-3">

                            <!-- Nom -->
                            <div class="col-md-6">
                                <label for="nom" class="form-label fw-semibold">Nom <span class="text-danger">*</span></label>
                                <input type="text" id="nom" class="form-control"
                                       th:field="*{nom}"
                                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                            </div>

                            <!-- Prénom -->
                            <div class="col-md-6">
                                <label for="prenom" class="form-label fw-semibold">Prénom <span class="text-danger">*</span></label>
                                <input type="text" id="prenom" class="form-control"
                                       th:field="*{prenom}"
                                       th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></div>
                            </div>

                            <!-- Civilité -->
                            <div class="col-md-6">
                                <label for="civilite" class="form-label fw-semibold">Civilité</label>
                                <select id="civilite" class="form-select" th:field="*{civilite}">
                                    <option th:each="c : ${civilites}"
                                            th:value="${c}"
                                            th:text="${c.name() == 'M' ? 'M.' : (c.name() == 'Mme' ? 'Mme' : 'Mlle')}">
                                    </option>
                                </select>
                            </div>

                            <!-- Date naissance -->
                            <div class="col-md-6">
                                <label for="dateNaissance" class="form-label fw-semibold">Date de naissance</label>
                                <input type="text" id="dateNaissance" name="dateNaissance"
                                       class="form-control" placeholder="JJ/MM/AAAA"
                                       th:value="${person.dateNaissance != null ? #temporals.format(person.dateNaissance, 'dd/MM/yyyy') : ''}"
                                       th:classappend="${#fields.hasErrors('dateNaissance')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dateNaissance')}" th:errors="*{dateNaissance}"></div>
                                <div class="form-text">Format : JJ/MM/AAAA</div>
                            </div>

                            <!-- Adresse -->
                            <div class="col-12">
                                <label for="adresse" class="form-label fw-semibold">Adresse</label>
                                <input type="text" id="adresse" class="form-control"
                                       th:field="*{adresse}" placeholder="Rue, ville...">
                            </div>
                        </div>

                        <!-- Boutons -->
                        <hr>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-lg me-1"></i> Enregistrer
                            </button>
                            <a th:href="@{/persons/search}" class="btn btn-outline-secondary">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
