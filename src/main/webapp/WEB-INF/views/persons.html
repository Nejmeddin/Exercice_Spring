<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head><title>Personnes</title></head>
<body>
<div layout:fragment="content">

    <!-- En-tête -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0"><i class="bi bi-people me-2" style="color:#f59e0b;"></i>Personnes</h4>
            <p class="text-muted small mb-0">
                <span th:text="${#lists.size(persons)}">0</span> enregistrement(s)
            </p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/persons/new}" class="btn btn-success btn-sm" sec:authorize="hasAnyRole('ADMIN','USER')">
                <i class="bi bi-person-plus me-1"></i> Ajouter
            </a>
            <a th:href="@{/persons/search}" class="btn btn-violet btn-sm">
                <i class="bi bi-search me-1"></i> Rechercher
            </a>
        </div>
    </div>

    <!-- Tableau -->
    <div class="card shadow-card">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead style="background:#f59e0b; color:#fff;">
                <tr>
                    <th>#</th>
                    <th>Civilité</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Adresse</th>
                    <th>Date naissance</th>
                    <th sec:authorize="hasRole('ADMIN')" class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${persons}">
                    <td class="text-muted" th:text="${p.id}"></td>
                    <td>
                        <span class="badge rounded-pill"
                              th:classappend="${p.civilite.name() == 'M'} ? 'bg-primary' : (${p.civilite.name() == 'Mme'} ? 'bg-success' : 'bg-warning text-dark')"
                              th:text="${p.civilite.name() == 'M' ? 'M.' : (p.civilite.name() == 'Mme' ? 'Mme' : 'Mlle')}"></span>
                    </td>
                    <td>
                        <a th:href="@{/persons/{id}(id=${p.id})}"
                           class="fw-bold text-decoration-none"
                           style="color:#6366f1;"
                           sec:authorize="hasRole('ADMIN')">
                            <span th:text="${p.nom}"></span>
                        </a>
                        <span th:text="${p.nom}" class="fw-bold" sec:authorize="!hasRole('ADMIN')"></span>
                    </td>
                    <td th:text="${p.prenom}"></td>
                    <td class="text-muted" th:text="${p.adresse} ?: '—'"></td>
                    <td class="text-muted"
                        th:text="${p.dateNaissance != null} ? ${#temporals.format(p.dateNaissance, 'dd/MM/yyyy')} : '—'"></td>
                    <td sec:authorize="hasRole('ADMIN')" class="text-center">
                        <form method="post" th:action="@{/persons/{id}/delete(id=${p.id})}"
                              onsubmit="return confirm('Supprimer cette personne ?');"
                              style="display:inline;">
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(persons)}">
                    <td colspan="7" class="text-center py-5">
                        <i class="bi bi-people" style="font-size:2.5rem; color:#f59e0b;"></i>
                        <p class="text-muted mt-2 mb-0">Aucune personne trouvée.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
