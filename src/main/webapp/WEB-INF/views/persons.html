<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Personnes</title></head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <div>
            <h4 class="fw-bold mb-0"><i class="bi bi-people text-success me-2"></i>Liste des personnes</h4>
            <p class="text-secondary small mb-0">
                <span th:text="${#lists.size(persons)}">0</span> enregistrement(s)
            </p>
        </div>
        <a th:href="@{/persons/search}" class="btn btn-primary btn-sm">
            <i class="bi bi-search me-1"></i> Rechercher
        </a>
    </div>

    <!-- Tableau -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>#</th>
                    <th>Civilité</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Adresse</th>
                    <th>Date naissance</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${persons}">
                    <td class="text-secondary" th:text="${p.id}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${p.civilite.name() == 'M'} ? 'bg-primary' : (${p.civilite.name() == 'Mme'} ? 'bg-success' : 'bg-info text-dark')"
                              th:text="${p.civilite.name() == 'M' ? 'M.' : (p.civilite.name() == 'Mme' ? 'Mme' : 'Mlle')}"></span>
                    </td>
                    <td>
                        <a th:href="@{/persons/{id}(id=${p.id})}"
                           class="fw-bold text-decoration-none text-primary">
                            <span th:text="${p.nom}"></span>
                        </a>
                    </td>
                    <td th:text="${p.prenom}"></td>
                    <td class="text-secondary" th:text="${p.adresse} ?: '—'"></td>
                    <td class="text-secondary"
                        th:text="${p.dateNaissance != null} ? ${#temporals.format(p.dateNaissance, 'dd/MM/yyyy')} : '—'"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(persons)}">
                    <td colspan="6" class="text-center py-5">
                        <i class="bi bi-people text-secondary" style="font-size:2.5rem;"></i>
                        <p class="text-secondary mt-2 mb-0">Aucune personne trouvée.</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
