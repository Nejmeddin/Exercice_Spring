<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Détail personne</title></head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-lg-8">

            <!-- Header -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h4 class="fw-bold mb-0"><i class="bi bi-pencil-square text-primary me-2"></i>Détail / Modification</h4>
                    <p class="text-secondary small mb-0">Modifiez les informations puis enregistrez</p>
                </div>
                <a th:href="@{/persons/search}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left me-1"></i> Retour
                </a>
            </div>

            <!-- Succès -->
            <div th:if="${success}" class="alert alert-success d-flex align-items-center" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${success}"></span>
            </div>

            <!-- Formulaire -->
            <div class="card shadow-sm">
                <div class="card-header bg-white d-flex align-items-center gap-2 py-3">
                    <div class="bg-primary text-white rounded d-flex align-items-center justify-content-center fw-bold"
                         style="width:40px;height:40px;font-size:1rem;"
                         th:text="${person.nom != null and !person.nom.isEmpty()} ? ${person.nom.substring(0,1).toUpperCase()} : '?'">A</div>
                    <div>
                        <span class="fw-bold" th:text="${person.prenom + ' ' + person.nom}"></span>
                        <br>
                        <small class="text-secondary">ID #<span th:text="${person.id}"></span></small>
                    </div>
                </div>
                <div class="card-body">
                    <form method="post" th:action="@{/persons/{id}(id=${person.id})}" th:object="${person}">
                        <div class="row g-3">

                            <!-- Nom -->
                            <div class="col-md-6">
                                <label for="nom" class="form-label small fw-bold text-secondary">NOM <span class="text-danger">*</span></label>
                                <input type="text" id="nom" class="form-control"
                                       th:field="*{nom}"
                                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>
                            </div>

                            <!-- Prénom -->
                            <div class="col-md-6">
                                <label for="prenom" class="form-label small fw-bold text-secondary">PRÉNOM <span class="text-danger">*</span></label>
                                <input type="text" id="prenom" class="form-control"
                                       th:field="*{prenom}"
                                       th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('prenom')}" th:errors="*{prenom}"></div>
                            </div>

                            <!-- Civilité -->
                            <div class="col-md-6">
                                <label for="civilite" class="form-label small fw-bold text-secondary">CIVILITÉ</label>
                                <select id="civilite" class="form-select" th:field="*{civilite}">
                                    <option th:each="c : ${civilites}"
                                            th:value="${c}"
                                            th:text="${c.name() == 'M' ? 'M.' : (c.name() == 'Mme' ? 'Mme' : 'Mlle')}">
                                    </option>
                                </select>
                            </div>

                            <!-- Date naissance -->
                            <div class="col-md-6">
                                <label for="dateNaissance" class="form-label small fw-bold text-secondary">DATE DE NAISSANCE</label>
                                <input type="text" id="dateNaissance" name="dateNaissance"
                                       class="form-control" placeholder="JJ/MM/AAAA"
                                       th:value="${person.dateNaissance != null ? #temporals.format(person.dateNaissance, 'dd/MM/yyyy') : ''}"
                                       th:classappend="${#fields.hasErrors('dateNaissance')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dateNaissance')}" th:errors="*{dateNaissance}"></div>
                                <div class="form-text">Format : JJ/MM/AAAA</div>
                            </div>

                            <!-- Adresse -->
                            <div class="col-12">
                                <label for="adresse" class="form-label small fw-bold text-secondary">ADRESSE</label>
                                <input type="text" id="adresse" class="form-control"
                                       th:field="*{adresse}" placeholder="Rue, ville, code postal...">
                            </div>
                        </div>

                        <!-- Boutons -->
                        <hr>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i> Enregistrer
                            </button>
                            <a th:href="@{/persons/search}" class="btn btn-outline-secondary">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</div>
</body>
</html>
