<!DOCTYPE html>

      layout:decorate="~{layout}">
<head><title>Accès refusé</title></head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">

            <h3 class="fw-bold mt-3">Accès refusé</h3>

        </div>
    </div>

</div>
