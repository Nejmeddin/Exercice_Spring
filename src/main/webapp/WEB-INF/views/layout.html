<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE | SpringApp">SpringApp</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-grid-fill me-1"></i> SpringApp
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house-door me-1"></i>Accueil</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/persons/search}"><i class="bi bi-search me-1"></i>Recherche</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/persons}"><i class="bi bi-people me-1"></i>Personnes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/users}"><i class="bi bi-person-gear me-1"></i>Utilisateurs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}"><i class="bi bi-box-arrow-in-right me-1"></i>Login</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenu -->
<div class="container py-4" layout:fragment="content">
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-auto">
    <small>&copy; 2026 SpringApp — Spring MVC · Thymeleaf · Bootstrap 5</small>
</footer>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
