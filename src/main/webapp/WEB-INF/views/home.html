<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head><title>Accueil</title></head>
<body>
<div layout:fragment="content">

    <!-- Hero -->
    <div class="text-center py-5 mb-4 rounded-4 text-white"
         style="background: linear-gradient(135deg, #6366f1, #ec4899);">
        <i class="bi bi-people-fill" style="font-size:3rem;"></i>
        <h2 class="fw-bold mt-2">Bienvenue sur GestionPro</h2>
        <p class="opacity-75 mb-4">Gérez facilement vos contacts et personnes.</p>
        <div sec:authorize="isAuthenticated()">
            <a th:href="@{/persons/search}" class="btn btn-light fw-bold me-2">
                <i class="bi bi-search me-1"></i> Rechercher
            </a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/persons/new}" class="btn btn-outline-light fw-bold">
                <i class="bi bi-person-plus me-1"></i> Ajouter
            </a>
        </div>
        <div sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" class="btn btn-light fw-bold">
                <i class="bi bi-box-arrow-in-right me-1"></i> Se connecter
            </a>
        </div>
    </div>

    <!-- Accès rapide -->
    <div class="row g-4" sec:authorize="isAuthenticated()">
        <div class="col-md-3">
            <div class="card shadow-card h-100 text-center p-4">
                <i class="bi bi-search fs-1 mb-2" style="color:#6366f1;"></i>
                <h6 class="fw-bold">Recherche</h6>
                <p class="text-muted small">Filtrer par nom, prénom, civilité</p>
                <a th:href="@{/persons/search}" class="btn btn-sm btn-violet mt-auto">Accéder</a>
            </div>
        </div>
        <div class="col-md-3" sec:authorize="hasRole('ADMIN')">
            <div class="card shadow-card h-100 text-center p-4">
                <i class="bi bi-person-plus fs-1 mb-2" style="color:#10b981;"></i>
                <h6 class="fw-bold">Ajouter</h6>
                <p class="text-muted small">Créer une nouvelle personne</p>
                <a th:href="@{/persons/new}" class="btn btn-sm btn-success mt-auto">Accéder</a>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card shadow-card h-100 text-center p-4">
                <i class="bi bi-people fs-1 mb-2" style="color:#f59e0b;"></i>
                <h6 class="fw-bold">Personnes</h6>
                <p class="text-muted small">Voir la liste complète</p>
                <a th:href="@{/persons}" class="btn btn-sm btn-warning mt-auto">Accéder</a>
            </div>
        </div>
        <div class="col-md-3" sec:authorize="hasRole('ADMIN')">
            <div class="card shadow-card h-100 text-center p-4">
                <i class="bi bi-gear fs-1 mb-2" style="color:#ef4444;"></i>
                <h6 class="fw-bold">Utilisateurs</h6>
                <p class="text-muted small">Gérer les comptes</p>
                <a th:href="@{/users}" class="btn btn-sm btn-danger mt-auto">Accéder</a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
