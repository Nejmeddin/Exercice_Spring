<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head><title>Accueil</title></head>
<body>
<div layout:fragment="content">

    <!-- Hero -->
    <div class="bg-white rounded shadow-sm p-5 mb-4">
        <h2 class="fw-bold"><i class="bi bi-grid-fill text-primary me-2"></i>Bienvenue</h2>
        <p class="text-secondary mb-4">Application de gestion de personnes — Spring MVC + Thymeleaf + Bootstrap 5.</p>
        <div class="d-flex gap-2">
            <a th:href="@{/persons/search}" class="btn btn-primary">
                <i class="bi bi-search me-1"></i> Rechercher une personne
            </a>
            <a th:href="@{/persons}" class="btn btn-outline-dark">
                <i class="bi bi-people me-1"></i> Voir toutes les personnes
            </a>
        </div>
    </div>

    <!-- Accès rapide -->
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <i class="bi bi-search text-primary fs-1 mb-3 d-block"></i>
                    <h6 class="fw-bold">Recherche</h6>
                    <p class="text-secondary small">Filtrer par nom, prénom, civilité</p>
                    <a th:href="@{/persons/search}" class="btn btn-sm btn-outline-primary">Accéder</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <i class="bi bi-people text-success fs-1 mb-3 d-block"></i>
                    <h6 class="fw-bold">Personnes</h6>
                    <p class="text-secondary small">Voir la liste complète</p>
                    <a th:href="@{/persons}" class="btn btn-sm btn-outline-success">Accéder</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm h-100">
                <div class="card-body text-center py-4">
                    <i class="bi bi-person-gear text-danger fs-1 mb-3 d-block"></i>
                    <h6 class="fw-bold">Utilisateurs</h6>
                    <p class="text-secondary small">Gérer les comptes</p>
                    <a th:href="@{/users}" class="btn btn-sm btn-outline-danger">Accéder</a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
