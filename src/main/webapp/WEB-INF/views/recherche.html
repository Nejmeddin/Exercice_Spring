<!DOCTYPE html>
<html lang="fr"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head><title>Recherche</title></head>
<body>
<div layout:fragment="content">

    <!-- En-tête -->
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-search me-2" style="color:#6366f1;"></i>Recherche</h4>
        <a th:href="@{/persons/new}" class="btn btn-sm btn-success" sec:authorize="hasAnyRole('ADMIN','USER')">
            <i class="bi bi-person-plus me-1"></i> Ajouter
        </a>
    </div>

    <!-- Message succès -->
    <div th:if="${success}" class="alert alert-success d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${success}"></span>
    </div>

    <!-- Formulaire de recherche -->
    <div class="card shadow-card mb-4">
        <div class="card-body p-4">
            <form th:action="@{/persons/search}" method="get" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label for="nom" class="form-label fw-semibold">Nom</label>
                    <input type="text" id="nom" name="nom" class="form-control"
                           placeholder="Contient..." th:value="${nom}">
                </div>
                <div class="col-md-3">
                    <label for="prenom" class="form-label fw-semibold">Prénom</label>
                    <input type="text" id="prenom" name="prenom" class="form-control"
                           placeholder="Contient..." th:value="${prenom}">
                </div>
                <div class="col-md-3">
                    <label for="civilite" class="form-label fw-semibold">Civilité</label>
                    <select id="civilite" name="civilite" class="form-select">
                        <option value="">— Toutes —</option>
                        <option th:each="c : ${civilites}"
                                th:value="${c}"
                                th:text="${c.name() == 'M' ? 'M.' : (c.name() == 'Mme' ? 'Mme' : 'Mlle')}"
                                th:selected="${civilite != null and civilite == c}">
                        </option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-violet">
                        <i class="bi bi-search me-1"></i> Rechercher
                    </button>
                    <a th:href="@{/persons/search}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Résultats -->
    <div th:if="${searched}">
        <p class="fw-semibold text-muted mb-2">
            <span th:text="${#lists.size(persons)}">0</span> résultat(s)
        </p>

        <div class="card shadow-card" th:if="${!#lists.isEmpty(persons)}">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead style="background:#6366f1; color:#fff;">
                    <tr>
                        <th>Nom</th>
                        <th>Prénom</th>
                        <th>Civilité</th>
                        <th>Adresse</th>
                        <th sec:authorize="hasRole('ADMIN')" class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${persons}">
                        <td>
                            <a th:href="@{/persons/{id}(id=${p.id})}"
                               class="fw-bold text-decoration-none"
                               style="color:#6366f1;"
                               sec:authorize="hasRole('ADMIN')">
                                <span th:text="${p.nom}"></span>
                            </a>
                            <span th:text="${p.nom}" class="fw-bold" sec:authorize="!hasRole('ADMIN')"></span>
                        </td>
                        <td th:text="${p.prenom}"></td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="${p.civilite.name() == 'M'} ? 'bg-primary' : (${p.civilite.name() == 'Mme'} ? 'bg-success' : 'bg-warning text-dark')"
                                  th:text="${p.civilite.name() == 'M' ? 'M.' : (p.civilite.name() == 'Mme' ? 'Mme' : 'Mlle')}">
                            </span>
                        </td>
                        <td class="text-muted" th:text="${p.adresse} ?: '—'"></td>
                        <td sec:authorize="hasRole('ADMIN')" class="text-center">
                            <form method="post" th:action="@{/persons/{id}/delete(id=${p.id})}"
                                  onsubmit="return confirm('Supprimer cette personne ?');"
                                  style="display:inline;">
                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Aucun résultat -->
        <div th:if="${#lists.isEmpty(persons)}" class="card shadow-card">
            <div class="card-body text-center py-5">
                <i class="bi bi-inbox" style="font-size:2.5rem; color:#a855f7;"></i>
                <p class="text-muted mt-2 mb-0">Aucun résultat trouvé.</p>
            </div>
        </div>
    </div>

    <!-- État initial -->
    <div th:unless="${searched}" class="card shadow-card">
        <div class="card-body text-center py-5">
            <i class="bi bi-search" style="font-size:2.5rem; color:#6366f1;"></i>
            <p class="text-muted mt-2 mb-0">Saisissez vos critères puis cliquez sur <strong>Rechercher</strong>.</p>
        </div>
    </div>

</div>
</body>
</html>
